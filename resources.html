</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="js/icons.jsx"></script>
  <script type="text/babel" src="js/site.jsx"></script>
  <script type="text/babel" src="js/productui.jsx"></script>
  <script type="text/babel" src="js/pages.jsx"></script>
  <script type="text/babel">
    const KB = [
      { icon: "spark", t: "Setup Your Account", items: [
        ["How to completely set up your account", "setup-account"],
      ] },
      { icon: "team", t: "Management Guide", items: [
        ["How to access & manage your IDs' projects", "access-manage-projects"],
        ["How to approve documents with DesignDen", "approve-documents"],
        ["How to manage ranks & profit-sharing percentage", "manage-ranks-profit-sharing"],
        ["How to assign leads to IDs", "assign-leads"],
      ] },
      { icon: "quote", t: "Interior Designers Guide", items: [
        ["How to handover and close a project", "handover-close-project"],
        ["How to confirm vendor invoice for cost tracking", "confirm-vendor-invoice"],
        ["How to create a VO (Variation Order)", "create-vo"],
        ["How to create quotations", "create-quotations"],
      ] },
      { icon: "cash", t: "Accountant / Admin Guide", items: [
        ["How to create Payment Vouchers", "create-payment-vouchers"],
        ["How to record a project's AP & AR", "record-ap-ar"],
      ] },
    ];
    function KnowledgeBase() {
      return (
        <section className="sec band-soft" id="knowledge-base">
          <div className="wrap">
            <SectionHead center eyebrow="Knowledge base" title="Step-by-step tutorials"
              lead="Short how-to guides for every role on your team — straight from the EnQuote docs." />
            <div className="kb-grid" style={{ marginTop: "2.4rem" }}>
              {KB.map((c) => (
                <div className="kb-card" key={c.t}>
                  <div className="kb-head">
                    <span className="kb-ic">{Ic[c.icon]({ size: 22 })}</span>
                    <h3>{c.t}</h3>
                    <span className="kb-count">{c.items.length} {c.items.length === 1 ? "guide" : "guides"}</span>
                  </div>
                  <div className="kb-list">
                    {c.items.map(([label, slug]) => (
                      <a className="kb-link" href={"tutorials.html#" + slug} key={label}>
                        <span className="kb-doc">{Ic.doc({ size: 17 })}</span>
                        {label}
                        <span className="kb-go">{Ic.arrowUpRight({ size: 16 })}</span>
                      </a>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ textAlign: "center", marginTop: "2rem" }}>
              <a className="btn btn-wa" href="tutorials.html">Browse all tutorials {Ic.arrow({ size: 16 })}</a>
            </div>
          </div>
        </section>
      );
    }
    const POSTS = [
      { cat: "Quoting", t: "Five quoting mistakes that quietly kill your margin", d: "The small pricing slips that add up across a year of project work — and how to stop them.", meta: "6 min read", img: "https://loremflickr.com/800/600/interior,modern?lock=21" },
      { cat: "Operations", t: "From WhatsApp chaos to one source of truth", d: "How growing firms move off scattered chats without slowing the team down.", meta: "5 min read", img: "https://loremflickr.com/800/600/office,workspace?lock=22" },
      { cat: "Finance", t: "What healthy cashflow looks like for a service business", d: "A practical look at tracking costs and margin on every project.", meta: "7 min read", img: "https://loremflickr.com/800/600/livingroom,interior?lock=23" },
    ];
    function Posts() {
      return (
        <section className="sec">
          <div className="wrap">
            <SectionHead center eyebrow="Daily insights" title="Fresh thinking for trade firms"
              lead="Practical articles on quoting, operations and growing a service business." />
            <div className="posts" style={{ marginTop: "2.2rem" }}>
              {POSTS.map((p) => (
                <a className="post" href="daily-insights.html" key={p.t}>
                  <div className="post-thumb"><img src={p.img} alt="" /><span className="post-cat">{p.cat}</span></div>
                  <div className="post-body">
                    <h3>{p.t}</h3>
                    <p>{p.d}</p>
                    <span className="post-meta">{p.meta}</span>
                  </div>
                </a>
              ))}
            </div>
            <div style={{ textAlign: "center", marginTop: "2rem" }}>
              <a className="btn btn-wa" href="daily-insights.html">View all insights {Ic.arrow({ size: 16 })}</a>
            </div>
          </div>
        </section>
      );
    }
    function Pg() {
      return (
        <Page>
          <PageHero solo
            crumb={[["Resources"]]}
            eyebrow="Learn & grow"
            title={<>Everything you need to get the most out of EnQuote.</>}
            sub="Step-by-step tutorials, practical articles and hands-on support — built to help renovation & service firms quote smarter and run leaner."
            primary={{ label: "Browse tutorials", href: "#knowledge-base" }}
            secondary={{ label: "Talk to us", href: "contact-us.html", icon: false }}
          />
          <KnowledgeBase />
          <Posts />
          <PageCTA title="Have a question we haven't answered?" sub="Our team replies fast on WhatsApp — or book a demo and we'll walk you through it." />
        </Page>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Pg />);
  </script>
</body>
</html>
