<!DOCTYPE html>
<html lang="en" data-theme="brand">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Demo — EnQuote</title>
  <meta name="description" content="Book a free 30-minute EnQuote demo. We'll map your current quoting flow and show you exactly where EnQuote saves your team hours." />
  <link rel="icon" type="image/png" href="assets/enquote-logo.png" />
  <link rel="canonical" href="https://enquote.io/request-a-demo.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="EnQuote" />
  <meta property="og:title" content="Request a Demo — EnQuote" />
  <meta property="og:description" content="Book a free 30-minute EnQuote demo. We'll map your current quoting flow and show you exactly where EnQuote saves your team hours." />
  <meta property="og:url" content="https://enquote.io/request-a-demo.html" />
  <meta property="og:image" content="https://enquote.io/wp-content/uploads/2025/01/1.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Request a Demo — EnQuote" />
  <meta name="twitter:description" content="Book a free 30-minute EnQuote demo. We'll map your current quoting flow and show you exactly where EnQuote saves your team hours." />
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","name":"EnQuote","url":"https://enquote.io/","logo":"https://enquote.io/assets/enquote-logo.png","description":"The go-to ERP to scale renovation & service businesses in Singapore.","email":"hello@leaptech.sg","telephone":"+6584955583","address":{"@type":"PostalAddress","addressCountry":"SG"},"sameAs":["https://www.instagram.com/enquote_io","https://www.facebook.com/"]}</script>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/product.css" />
  <link rel="stylesheet" href="styles/sections.css" />
  <link rel="stylesheet" href="styles/pages.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="js/icons.jsx"></script>
  <script type="text/babel" src="js/site.jsx"></script>
  <script type="text/babel" src="js/productui.jsx"></script>
  <script type="text/babel" src="js/pages.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function DemoForm() {
      const [sent, setSent] = useState(false);
      const [waUrl, setWaUrl] = useState("");
      const [err, setErr] = useState({});
      const submit = (e) => {
        e.preventDefault();
        const f = e.target;
        const next = {};
        if (!f.name.value.trim()) next.name = true;
        if (!/^\S+@\S+\.\S+$/.test(f.email.value)) next.email = true;
        if (!f.company.value.trim()) next.company = true;
        setErr(next);
        if (Object.keys(next).length) return;
        const data = Object.fromEntries(new FormData(f).entries());
        data._form = "Demo request";
        setWaUrl(sendViaWhatsApp(data));
        setSent(true);
      };
      if (sent) return (
        <div className="form-card">
          <div className="form-success" style={{ flexDirection: "column", alignItems: "flex-start", gap: "0.8rem" }}>
            <span>{Ic.whatsapp({ size: 22 })} Opening WhatsApp with your demo request — just tap send.</span>
            <a className="btn btn-primary" href={waUrl} target="_blank" rel="noopener">{Ic.whatsapp({ size: 18 })} Open WhatsApp chat</a>
          </div>
        </div>
      );
      return (
        <form className="form-card" onSubmit={submit} noValidate>
          <div className="field-row">
            <div className="field"><label>Full name</label><input name="name" placeholder="Your name" style={err.name ? { borderColor: "var(--accent)" } : null} /></div>
            <div className="field"><label>Company</label><input name="company" placeholder="Company name" style={err.company ? { borderColor: "var(--accent)" } : null} /></div>
          </div>
          <div className="field"><label>Work email</label><input name="email" type="email" placeholder="you@company.com" style={err.email ? { borderColor: "var(--accent)" } : null} /></div>
          <div className="field-row">
            <div className="field"><label>Team size</label>
              <select name="size"><option>1–5</option><option>6–15</option><option>16–40</option><option>40+</option></select>
            </div>
            <div className="field"><label>Current tools</label>
              <select name="tools"><option>Spreadsheets & WhatsApp</option><option>Another ERP/CRM</option><option>Xero / QuickBooks only</option><option>Pen & paper</option></select>
            </div>
          </div>
          <div className="field"><label>What would you like to see? <span style={{ color: "var(--ink-faint)", fontWeight: 400 }}>(optional)</span></label><textarea name="message" rows="3" placeholder="e.g. faster quoting, project tracking, accounting sync"></textarea></div>
          <button className="btn btn-primary btn-lg" type="submit" style={{ width: "100%", justifyContent: "center" }}>{Ic.whatsapp({ size: 18 })} Book via WhatsApp</button>
          <p style={{ fontSize: "0.8rem", color: "var(--ink-faint)", textAlign: "center", marginTop: "0.8rem", fontFamily: "var(--font-mono)" }}>No spreadsheets harmed · Setup support included</p>
        </form>
      );
    }
    function Pg() {
      return (
        <Page>
          <PageHero
            crumb={[["Request a Demo"]]}
            eyebrow="Get started"
            title={<>See EnQuote mapped to your firm.</>}
            sub="Book a free 30-minute consultation. We'll walk through your current quoting flow and show you exactly where EnQuote saves your team hours."
            visual={<DemoForm />}
            primary={{ label: "Request a demo", href: "#" }}
            secondary={{ label: "Chat on WhatsApp" }}
          />
          <StatBand band stats={[
            { value: "30 min", label: "focused walkthrough" },
            { value: "80+", label: "firms onboard" },
            { value: "1,000+", label: "active users" },
            { value: "Free", label: "no commitment" },
          ]} />
          <Steps eyebrow="What to expect" title="Three simple steps"
            steps={[
              { t: "Book", d: "Pick a time that suits — or just message us on WhatsApp." },
              { t: "Walkthrough", d: "We map EnQuote to how your firm quotes and runs projects today." },
              { t: "Decide", d: "See the fit, get a clear quote, and start with setup support." },
            ]} />
          <FAQ items={[
            { q: "How long is the demo?", a: "About 30 minutes — enough to see quoting, project tracking and accounting sync mapped to your firm." },
            { q: "Is it really free?", a: "Yes. The demo and consultation are free, with no obligation to continue." },
            { q: "Who should join?", a: "Whoever owns quoting and operations — often the founder plus a sales lead. We'll tailor it to your team." },
          ]} />
        </Page>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Pg />);
  </script>
</body>
</html>
