<!DOCTYPE html>
<html lang="en" data-theme="brand">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy — EnQuote</title>
  <meta name="description" content="EnQuote Privacy Policy — how Leaptechnology Pte Ltd collects, uses and protects your personal data under Singapore's PDPA." />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/product.css" />
  <link rel="stylesheet" href="styles/sections.css" />
  <link rel="stylesheet" href="styles/pages.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="js/icons.jsx"></script>
  <script type="text/babel" src="js/site.jsx"></script>
  <script type="text/babel" src="js/pages.jsx"></script>
  <script type="text/babel">
    const SECTIONS = [
      { t: "1. Introduction", c: [
        "Leaptechnology Pte Ltd (\u201cLeaptech\u201d, \u201cwe\u201d, \u201cus\u201d, or \u201cour\u201d) is committed to protecting the personal data of our users in accordance with the Personal Data Protection Act 2012 (PDPA) of Singapore.",
        "This Privacy Policy explains how we collect, use, disclose, and protect your personal data when you access or use the EnQuote application (\u201cEnQuote\u201d). By using EnQuote, you acknowledge that you have read and agreed to this Privacy Policy.",
        "If you do not agree to this Privacy Policy, please do not use EnQuote and contact us at support@leaptech.sg.",
      ] },
      { t: "2. Personal Data We Collect", c: [
        "We collect the following types of personal data:",
        ["Account Information \u2014 name, company name, email address, and phone number provided during account registration or setup",
         "Usage Data \u2014 information about how you interact with EnQuote, including login timestamps, features accessed, pages visited, session duration, and actions performed within the application",
         "User-Generated Content \u2014 data entered into EnQuote in the course of business operations, including quotations, invoices, customer records, and related business documents",
         "Device and Technical Data \u2014 browser type, operating system, IP address, and device identifiers collected automatically when you access EnQuote",
         "Communication Data \u2014 records of your communications with Leaptech including support requests and correspondence"],
      ] },
      { t: "3. How We Collect Your Personal Data", c: [
        "We collect personal data through the following means:",
        ["Directly from you when you register for an account, update your profile, or contact us for support",
         "Automatically when you use EnQuote, through cookies, log files, and usage tracking technologies",
         "From third party service providers such as cloud hosting and analytics platforms used to operate EnQuote"],
      ] },
      { t: "4. How We Use Your Personal Data", c: [
        "We use your personal data for the following purposes:",
        ["To provide, operate, and maintain EnQuote and your account",
         "To process and manage your Subscription",
         "To provide technical support during Office Hours",
         "To send service-related communications including system updates, maintenance notices, and policy changes",
         "To monitor and improve the performance, security, and functionality of EnQuote",
         "To detect, investigate, and prevent fraudulent or unauthorised activity",
         "To comply with applicable legal obligations",
         "To enforce our Terms of Use and other agreements"],
        "We will not use your personal data for marketing purposes without your separate and explicit consent.",
      ] },
      { t: "5. Disclosure of Personal Data", c: [
        "We may disclose your personal data to the following categories of third parties strictly for the purposes outlined in this Policy:",
        ["Cloud Hosting Providers \u2014 for the storage and operation of EnQuote on secure servers located in Singapore",
         "Analytics Service Providers \u2014 for monitoring application performance and usage patterns to improve EnQuote",
         "Legal and Regulatory Authorities \u2014 where required by law, court order, or regulatory obligation",
         "Professional Advisors \u2014 including lawyers, auditors, and insurers where necessary for the operation of our business"],
        "All third party service providers engaged by Leaptech are contractually required to handle your personal data in accordance with the PDPA and to use it only for the specific purposes for which it was disclosed.",
        "We do not sell, rent, or trade your personal data to any third party.",
      ] },
      { t: "6. Data Storage and Security", c: [
        "All personal data collected through EnQuote is stored on servers located in Singapore. We do not transfer your personal data outside of Singapore.",
        "Leaptech implements industry-standard technical and organisational measures to protect your personal data against unauthorised access, disclosure, alteration, or destruction. These measures include but are not limited to encrypted data transmission, access controls, and regular security assessments.",
        "However, no method of transmission over the internet or electronic storage is completely secure. While we strive to protect your personal data, we cannot guarantee absolute security.",
        "You are responsible for maintaining the confidentiality of your EnQuote account credentials. Please notify us immediately at support@leaptech.sg if you suspect any unauthorised access to your account.",
      ] },
      { t: "7. Data Breach Notification", c: [
        "In the event of a data breach that is likely to result in significant harm to affected individuals, Leaptech will:",
        ["Notify the Personal Data Protection Commission (PDPC) as required under the PDPA within three (3) business days of becoming aware of the breach",
         "Notify affected Users as soon as reasonably practicable where the breach is likely to result in significant harm",
         "Take immediate steps to contain the breach and mitigate any potential harm"],
        "Breach notifications to Users will be sent to the email address registered to your EnQuote account.",
      ] },
      { t: "8. Retention of Personal Data", c: [
        "We retain your personal data for as long as your account remains active or as necessary to fulfil the purposes outlined in this Policy, comply with legal obligations, resolve disputes, and enforce our agreements.",
        "Upon termination or cancellation of your Subscription, Leaptech will retain your data for a period of 30 days during which your account may be reactivated. Following the 30-day period, your data will be archived or deleted unless a longer retention period is required by law.",
        "If you wish to request permanent deletion of your data prior to or following this period, please contact us at support@leaptech.sg.",
      ] },
      { t: "9. Your Rights Under the PDPA", c: [
        "Under the PDPA, you have the right to:",
        ["Access \u2014 request access to the personal data we hold about you",
         "Correction \u2014 request correction of any inaccurate or incomplete personal data",
         "Withdrawal of Consent \u2014 withdraw consent to the collection, use, or disclosure of your personal data at any time, subject to legal or contractual restrictions",
         "Data Portability \u2014 request a copy of your personal data in a commonly used machine-readable format where applicable"],
        "To exercise any of these rights, please submit a written request to support@leaptech.sg. We will respond within 30 days of receiving your request.",
        "Please note that withdrawal of consent may affect your ability to use EnQuote and the services provided under your Subscription.",
      ] },
      { t: "10. Cookies and Tracking", c: [
        "EnQuote uses cookies and similar tracking technologies to improve user experience, maintain session security, and collect usage analytics. The types of cookies we use include:",
        ["Essential Cookies \u2014 required for EnQuote to function properly, including session management and security",
         "Analytics Cookies \u2014 used to understand how users interact with EnQuote to improve performance and usability"],
        "You may configure your browser to refuse cookies; however, doing so may affect the functionality of EnQuote. By continuing to use EnQuote, you consent to our use of cookies in accordance with this Policy.",
        "We do not currently respond to Do Not Track (DNT) signals as there is no industry-wide standard for DNT compliance. We will update this Policy if our practice changes.",
      ] },
      { t: "11. Children\u2019s Privacy", c: [
        "EnQuote is not directed at individuals under the age of 15. We do not knowingly collect personal data from anyone under 15 years of age. If you become aware that a person under 15 has provided us with personal data without appropriate consent, please contact us at support@leaptech.sg and we will take steps to delete such data.",
      ] },
      { t: "12. Marketing Communications", c: [
        "We will only send you marketing or promotional communications if you have explicitly opted in to receive them. You may opt out of receiving marketing communications at any time by:",
        ["Clicking the unsubscribe link in any marketing email we send you",
         "Contacting us directly at support@leaptech.sg"],
        "Please note that opting out of marketing communications does not affect service-related communications which are necessary for the operation of your account.",
      ] },
      { t: "13. Third Party Links and Integrations", c: [
        "EnQuote may integrate with or link to third party services or platforms. Leaptech is not responsible for the privacy practices of such third parties. We encourage you to review the privacy policies of any third party services you access through EnQuote.",
      ] },
      { t: "14. Changes to This Privacy Policy", c: [
        "Leaptech reserves the right to update this Privacy Policy at any time. When we do, we will update the \u201cLast Updated\u201d date at the top of this page and notify users via the EnQuote login page.",
        "Your continued use of EnQuote following notification of any update constitutes acceptance of the revised Privacy Policy. If you do not agree to the updated Policy, you should discontinue use of EnQuote and contact us at support@leaptech.sg.",
      ] },
      { t: "15. Governing Law", c: [
        "This Privacy Policy shall be governed by and construed in accordance with the laws of the Republic of Singapore. Any dispute arising out of or in connection with this Policy shall be subject to the exclusive jurisdiction of the courts of Singapore.",
      ] },
      { t: "16. Contact Us", c: [
        "For any questions, concerns, or requests relating to this Privacy Policy or the handling of your personal data, please contact Leaptechnology Pte Ltd \u2014 Data Protection Officer, at support@leaptech.sg.",
      ] },
    ];

    function LegalBlock({ item }) {
      return (
        <>
          <h2>{item.t}</h2>
          {item.c.map((b, i) => Array.isArray(b)
            ? <ul key={i}>{b.map((li, j) => <li key={j}>{li}</li>)}</ul>
            : <p key={i}>{b}</p>)}
        </>
      );
    }

    function Pg() {
      return (
        <Page>
          <section className="phero" style={{ paddingBottom: "1.6rem" }}>
            <div className="wrap">
              <Crumb trail={[["Privacy Policy"]]} />
              <h1 className="phero-title" style={{ fontSize: "clamp(2rem,1.5rem+2vw,3rem)" }}>Privacy Policy</h1>
              <p className="phero-sub">Leaptechnology Pte Ltd</p>
            </div>
          </section>
          <section className="sec" style={{ paddingTop: "2.4rem" }}>
            <div className="wrap legal">
              <p className="updated">Last updated: 27 April 2026 · PDPA (Singapore)</p>
              {SECTIONS.map((s) => <LegalBlock item={s} key={s.t} />)}
            </div>
          </section>
          <PageCTA title="Questions about your data?" sub="Contact our Data Protection Officer and we'll help." />
        </Page>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Pg />);
  </script>
</body>
</html>
